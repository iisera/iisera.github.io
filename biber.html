<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Sono:wght,MONO@200..800,1&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">

<title>Leopard Biber</title>

<style>
:root {
    --page-margin: clamp(0px, calc(300px * (100vw / 1920px)), 300px);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Source Code Pro", monospace;
    background-color: #050505;
    color: #f4f4f4;
    line-height: 1.6;
    min-height: 100vh;
}

.gallery {
    margin: 2.5rem var(--page-margin) 0;
    display: grid;
    grid-template-columns: 1fr;
    padding: 0;
    gap: 1rem;
}

.gallery-item {
    background: #000000;
    overflow: hidden;
    position: relative;
}

.gallery-item img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
}

.gallery-item::after {
    content: "";
    position: absolute;
    inset: 0;
    border: 0 solid #000000;
    pointer-events: none;
    transition: border-width 0.25s ease;
}

.gallery-item:hover::after {
    border-width: 20px;
}

.projects-header {
    margin: 0 var(--page-margin);
    font-size: 2.2rem;
    font-weight: 600;
    margin-bottom: 1rem;
    letter-spacing: -0.02em;
}

.page {
    margin: 40px var(--page-margin) 0;
    padding: 0;
    display: flex;
    align-items: flex-start;
}

.layout {
    width: 100%;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 3rem;
    align-items: start;
}

.left-block {
    text-align: left;
}

.left-block h1 {
    font-size: 2.9rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
    letter-spacing: -0.02em;
}

.back-link {
    display: inline-block;
    color: #f4f4f4;
    text-decoration: none;
    font-size: 2.9rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 0.25rem;
    transition: color 0.2s ease, transform 0.2s ease;
}

.back-link:hover {
    color: #ff0000;
    transform: scale(1.02);
}

.subheader {
    font-size: 0.95rem;
    color: #d2d2d2;
    margin-bottom: 1.3rem;
    text-transform: uppercase;
    letter-spacing: 0.24em;
}

.left-block p {
    width: 100%;
    max-width: 100%;
    font-size: 1.3rem;
    line-height: 1.2;
    letter-spacing: 0.1em;
    color: #c0c0c0;
    overflow-wrap: anywhere;
    word-break: break-word;
}

.links {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.4rem;
    text-align: right;
    height: auto;
    padding-top: 0.35rem;
}

.links a {
    display: inline-flex;
    flex-direction: column;
    align-items: flex-end;
    color: #f4f4f4;
    text-decoration: none;
    font-size: 1.4rem;
    line-height: 0.95;
    gap: 0.05em;
}

.links a span {
    display: block;
}

.links a:hover {
    color: #f4f4f4;
    transform: none;
}

.links .link-text {
    color: #f4f4f4;
    text-decoration: none;
    font-size: 1.4rem;
    line-height: 0.95;
}

</style>

</head>
<body>

<div class="page">
    <div class="layout">
        <div class="left-block">
            <a class="back-link" href="index.html"><-Back to gallery</a>
            <h1>Leopard 1 Bridgelayer</h1>
            <p>
                Leopard 1 Bridgelayer "Biber" 3d model made for an upcoming Outerra World Sandbox project. 187k tris, 10 LODs, 4x4096 + 1x256 UDIM PBR textures
            </p>
        </div>

        <div class="links">
            <a href="https://www.artstation.com/demiian" target="_blank"><span>artstation</span></a>
            <a href="https://www.linkedin.com/in/d-almashii/" target="_blank"><span>linkedin</span></a>
            <a href="cv.pdf" target="_blank"><span>resume</span></a>
            <a href="mailto:d.almashii@outlook.com"><span>email</span></a>
            <a href="https://t.me/d_almashii" target="_blank"><span>telegram</span></a>
            <span class="link-text">discord - iiseraa</span>
        </div>
    </div>
</div>

<div class="gallery">
    <a class="gallery-item" href="images/projects/biber/biber1.png" target="_blank">
            <img src="images/projects/biber/biber1.png" alt="render 1">
        </a>
    <a class="gallery-item" href="images/projects/biber/biber2.png" target="_blank">
            <img src="images/projects/biber/biber2.png" alt="render 2">
        </a>
    <a class="gallery-item" href="images/projects/biber/biber3.png" target="_blank">
            <img src="images/projects/biber/biber3.png" alt="render 3">
        </a>

</div>

</body>
</html>
